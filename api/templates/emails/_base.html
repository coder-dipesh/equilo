{% load static %}<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="color-scheme" content="light only">
    <meta name="supported-color-schemes" content="light">
    <title>{{ subject|default:"Equilo" }}</title>
    <style>
      /* Inline-friendly styles. Most clients strip <style>; the per-element
         style attributes below are the source of truth, this is a fallback. */
      body { margin: 0; padding: 0; background: #f4f5f8; }
      a { color: #2f6feb; }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#f4f5f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1f2330;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f4f5f8;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;background:#ffffff;border:1px solid #e6e8ee;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="padding:20px 28px;border-bottom:1px solid #eef0f5;">
                <span style="font-size:18px;font-weight:600;letter-spacing:-0.01em;color:#2f6feb;">Equilo</span>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 28px 8px 28px;font-size:15px;line-height:1.55;color:#1f2330;">
                {% block body %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px 24px 28px;border-top:1px solid #eef0f5;font-size:12px;line-height:1.5;color:#6b7280;">
                You're receiving this because you're an Equilo member.
                <a href="{{ unsubscribe_url }}" style="color:#6b7280;text-decoration:underline;">Unsubscribe from these emails</a>.
              </td>
            </tr>
          </table>
          <div style="font-size:11px;color:#9aa0ac;margin-top:14px;">Equilo &middot; Shared expenses, made simple.</div>
        </td>
      </tr>
    </table>
  </body>
</html>
